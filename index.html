  /* ─────────────────────────────────────────
     SCORING  (行為模式推算，不靠直接對應)
  ───────────────────────────────────────── */
  function pickType(answers) {
    const scores = { prover:0, gatekeeper:0, exit:0, pleaser:0, observer:0, bloomer:0 };

    // Q1 自我對話關鍵字
    const talk = (answers[0] || '').toString();
    if (/沒用|爛|廢|不夠|失敗|垃圾|不行/.test(talk))   scores.prover += 2;
    if (/放棄|算了|反正|逃|沒意思/.test(talk))          scores.exit += 3;
    if (/晚|來不及|太老|年紀|追/.test(talk))            scores.bloomer += 3;
    if (/麻煩|拖累|別人|負擔/.test(talk))               scores.pleaser += 2;
    if (/想太多|為什麼|分析|弄清楚/.test(talk))         scores.observer += 2;
    if (/應該|必須|要先|計畫|安排/.test(talk))          scores.gatekeeper += 2;

    // Q2 身體訊號
    const body = answers[1] || [];
    if (body.includes('失眠、淺眠、很難關機'))      { scores.prover+=2; scores.gatekeeper+=2; }
    if (body.includes('肩頸腰背慢性緊繃'))          { scores.prover+=1; scores.gatekeeper+=2; }
    if (body.includes('容易疲倦、提不起勁'))         { scores.exit+=2; scores.bloomer+=1; }
    if (body.includes('焦慮、心悸、胸口悶'))         { scores.prover+=1; scores.bloomer+=2; scores.gatekeeper+=1; }
    if (body.includes('胃痛、腸胃不穩'))             { scores.pleaser+=2; scores.gatekeeper+=1; }
    if (body.includes('莫名想哭、情緒容易潰堤'))     { scores.pleaser+=2; scores.exit+=1; }
    if (body.includes('感覺麻木、跟身體有點斷線'))   { scores.observer+=3; }

    // Q3 完成一件事後的念頭
    const q3 = answers[2] || '';
    if (q3.startsWith('終於做完了，但還有更多'))    scores.prover += 3;
    if (q3.startsWith('做得夠好嗎'))               scores.prover += 2;
    if (q3.startsWith('好，下一個'))               scores.prover += 1;
    if (q3.startsWith('其實沒什麼，運氣好'))         scores.pleaser += 2;
    if (q3.startsWith('我終於追上了'))              scores.bloomer += 3;
    if (q3.startsWith('鬆了口氣，但不知道'))         scores.observer += 2;

    // Q4 關係不舒服時的反應
    const q4 = answers[3] || '';
    if (q4.startsWith('先忍著'))                   scores.pleaser += 3;
    if (q4.startsWith('開始在腦子裡分析'))          scores.observer += 3;
    if (q4.startsWith('把自己的感受壓下去'))        scores.pleaser += 3;
    if (q4.startsWith('想辦法把這件事處理掉'))      scores.gatekeeper += 3;
    if (q4.startsWith('乾脆退出'))                 scores.exit += 4;
    if (q4.startsWith('抽離，用旁觀'))              scores.observer += 4;

    // Q5 什麼都不用做的感覺
    const q5 = answers[4] || '';
    if (q5.startsWith('不安，感覺自己沒有在前進'))  scores.prover += 3;
    if (q5.startsWith('鬆一口氣，但又有點空'))      scores.exit += 1;
    if (q5.startsWith('擔心有什麼事沒顧到'))        scores.gatekeeper += 4;
    if (q5.startsWith('有點麻木'))                  scores.observer += 3;
    if (q5.startsWith('有罪惡感'))                  scores.prover += 2;
    if (q5.startsWith('焦慮，感覺別人都沒有停'))    scores.bloomer += 3;

    // Q6 家庭規則 (multi)
    const fam = answers[5] || [];
    if (fam.includes('要比別人更努力才算夠'))       scores.prover += 2;
    if (fam.includes('情緒要自己消化，不能麻煩別人')) { scores.pleaser+=2; scores.observer+=1; }
    if (fam.includes('要先顧好別人，再想自己'))     scores.pleaser += 2;
    if (fam.includes('乖、聽話、不惹事才是好的'))   scores.pleaser += 1;
    if (fam.includes('不能讓外人看到家裡的問題'))   scores.gatekeeper += 2;

    // Q7 文字略過，只有關鍵字輔助
    const mem = (answers[6] || '').toString();
    if (/比較|不夠好|不如/.test(mem))              scores.prover += 1;
    if (/拋棄|離開|消失/.test(mem))                scores.exit += 1;
    if (/沒人懂|沒人在乎/.test(mem))               scores.observer += 1;

    // Q8 最容易消失的時刻
    const q8 = answers[7] || '';
    if (q8.startsWith('快要成功，但還沒確定'))      scores.exit += 4;
    if (q8.startsWith('被人期待太高'))              scores.prover += 3;
    if (q8.startsWith('感覺自己快成為別人負擔'))    scores.pleaser += 4;
    if (q8.startsWith('情緒太滿、快要裝不下'))      { scores.exit+=2; scores.observer+=2; }
    if (q8.startsWith('覺得自己太慢'))              scores.bloomer += 4;

    // Q9 一年後的願望關鍵字
    const wish = (answers[8] || '').toString();
    if (/別人.*失望|在意.*眼光|被接受/.test(wish)) scores.pleaser += 2;
    if (/停下來|休息|不用拚/.test(wish))            scores.prover += 1;
    if (/開始|出發|終於/.test(wish))                scores.bloomer += 2;
    if (/明白|搞清楚|知道自己/.test(wish))          scores.observer += 1;

    // 選最高分，平手 prover 優先
    let best = 'prover', max = -1;
    for (const k of Object.keys(scores)) {
      if (scores[k] > max) { max = scores[k]; best = k; }
    }
    return REPORTS[best];
  }

  /* ─────────────────────────────────────────
     Typewriter hook
  ───────────────────────────────────────── */
  function useTypewriter(lines, speed = 28, startDelay = 400) {
    const [out, setOut] = useState([]);
    const [done, setDone] = useState(false);
    const [skip, setSkip] = useState(false);

    useEffect(() => {
      if (skip) { setOut(lines); setDone(true); return; }
      let cancelled = false;
      let line = 0, ch = 0;
      let buf = lines.map(() => '');
      const tick = () => {
        if (cancelled) return;
        if (line >= lines.length) { setDone(true); return; }
        const full = lines[line];
        if (full.length === 0) {
          buf[line] = ''; line++; ch = 0;
          setOut([...buf]);
          setTimeout(tick, 260); return;
        }
        ch++;
        buf[line] = full.slice(0, ch);
        setOut([...buf]);
        if (ch >= full.length) {
          const pause = /[。？！，]$/.test(full) ? 340 : 180;
          line++; ch = 0;
          setTimeout(tick, pause);
        } else {
          setTimeout(tick, speed + Math.random() * 20);
        }
      };
      const t = setTimeout(tick, startDelay);
      return () => { cancelled = true; clearTimeout(t); };
    }, [skip]);

    return { out, done, skip: () => setSkip(true) };
  }

  function App() {
    const [stage, setStage] = useState('intro');
    const [idx, setIdx] = useState(0);
    const [answers, setAnswers] = useState({});

    const start = () => { setStage('q'); setIdx(0); };
    const next = (value) => {
      setAnswers(a => ({...a, [idx]: value}));
      if (idx + 1 < QUESTIONS.length) {
        setIdx(idx + 1);
      } else {
        setStage('computing');
        setTimeout(() => setStage('report'), 3600);
      }
    };
    const back = () => { if (idx > 0) setIdx(idx - 1); };

    return (
      <>
        {stage === 'intro'     && <Intro onStart={start} />}
        {stage === 'q'         && <QuestionScreen idx={idx} total={QUESTIONS.length} q={QUESTIONS[idx]} initial={answers[idx]} onNext={next} onBack={back} />}
        {stage === 'computing' && <Computing />}
        {stage === 'report'    && <Report answers={answers} />}
      </>
    );
  }

  function StoryModal({ report, onClose }) {
    const cardRef = useRef(null);
    const [busy, setBusy] = useState(false);
    const [scale, setScale] = useState(0.28);

    useEffect(() => {
      const fit = () => {
        const vh = window.innerHeight - 200;
        const vw = window.innerWidth - 64;
        setScale(Math.min(vh / 1920, vw / 1080, 0.38));
      };
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    const download = async () => {
      if (!cardRef.current) return;
      setBusy(true);
      try {
        // Use html2canvas if available, otherwise show instruction
        if (window.html2canvas) {
          const canvas = await window.html2canvas(cardRef.current, {
            backgroundColor: null, scale: 2, useCORS: true,
            width: 1080, height: 1920, windowWidth: 1080, windowHeight: 1920,
          });
          const link = document.createElement('a');
          link.download = `rewire-${report.key}-story.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } else {
          alert('請長按圖片儲存，或截圖後裁切後分享到 IG 限動。');
        }
      } catch(e){ console.error(e); }
      setBusy(false);
    };

    return (
      <div style={mS.backdrop} onClick={onClose}>
        <div style={mS.modal} onClick={e=>e.stopPropagation()}>
          <div style={mS.header}>
            <div style={mS.title}>IG Story · 1080 × 1920</div>
            <button style={mS.close} onClick={onClose}>✕</button>
          </div>

          {/* Preview */}
          <div style={{display:'flex', justifyContent:'center', overflow:'hidden', height: 1920*scale+4}}>
            <div style={{transform:`scale(${scale})`, transformOrigin:'top center', flexShrink:0}}>
              <StoryCard cardRef={cardRef} report={report}/>
            </div>
          </div>

          <div style={mS.actions}>
            <button style={mS.dlBtn} onClick={download} disabled={busy}>
              {busy ? '生成中⋯' : '下載圖片'}
            </button>
            <div style={mS.hint}>
              下載後 → 打開 IG → 新增限動 → 選圖片<br/>
              記得標記 <strong>@my.rewire</strong>
            </div>
          </div>
        </div>
      </div>
    );
  }
