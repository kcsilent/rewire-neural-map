  :root{

    --ivory-soft: #e8dcc2;
    --paper: #f5efe0;

    --ink: #2a3624;
    --ink-soft: #4a5542;
    --ink-muted: #6b7562;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    font-family: 'Noto Serif TC', serif;
    background: var(--forest-deep);
    color: var(--ivory);
    -webkit-font-smoothing: antialiased;
    font-weight: 400;
    letter-spacing: 0.01em;
    overflow-x: hidden;
  }

  /* subtle paper grain */
  .grain::before{
    content:'';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.14 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.35;
    mix-blend-mode: overlay;
    z-index: 9999;
  }

  button{ font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  textarea, input{ font-family: inherit; }

  /* reveal */
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  /* cursor blink */
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .caret::after{
    content:'';
    display: inline-block;
    width: 2px;
    height: 1em;
    vertical-align: -0.15em;
    background: currentColor;
    margin-left: 3px;
    animation: blink 1s steps(1) infinite;
  }

  /* dot progress */
  .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(242,234,216,0.2);
    transition: all 400ms cubic-bezier(.2,.8,.2,1);
  }
  .dot.done{ background: var(--forest-pale); }
  .dot.active{ background: var(--ivory); width: 24px; border-radius: 3px; }
</style>

  /* ---------- Type-picking logic ---------- */
  function pickType(answers){
    const scores = { prover:0, gatekeeper:0, exit:0, pleaser:0, observer:0, bloomer:0 };
    // Q6 single choice — direct signal
    const role = answers[5] || '';
    if (role.startsWith('給予者')) scores.pleaser += 5;
    else if (role.startsWith('證明者')) scores.prover += 5;
    else if (role.startsWith('觀察者')) scores.observer += 5;
    else if (role.startsWith('守門人')) scores.gatekeeper += 5;
    else if (role.startsWith('退場者')) scores.exit += 5;
    else if (role.startsWith('討好者')) scores.pleaser += 5;

    // Q2 body multi — weighting
    const body = answers[1] || [];
    if (body.includes('失眠、淺眠、很難關機')) { scores.prover+=2; scores.gatekeeper+=2; }
    if (body.includes('肩頸腰背慢性緊繃')) { scores.prover+=2; scores.gatekeeper+=2; }
    if (body.includes('容易疲倦、提不起勁')) { scores.exit+=2; scores.bloomer+=1; }
    if (body.includes('焦慮、心悸、胸口悶')) { scores.prover+=1; scores.bloomer+=2; scores.gatekeeper+=1; }
    if (body.includes('胃痛、腸胃不穩')) { scores.pleaser+=2; scores.gatekeeper+=1; }
    if (body.includes('莫名想哭、情緒容易潰堤')) { scores.pleaser+=2; }
    if (body.includes('感覺麻木、跟身體有點斷線')) { scores.observer+=3; }

    // Q1 self-talk keywords
    const talk = (answers[0] || '').toString();
    if (/沒用|爛|廢|不夠|失敗|垃圾/.test(talk)) scores.prover += 1;
    if (/放棄|算了|反正|逃/.test(talk)) scores.exit += 2;
    if (/晚|來不及|太老|年紀/.test(talk)) scores.bloomer += 2;
    if (/麻煩|拖累|別人/.test(talk)) scores.pleaser += 1;
    if (/想太多|為什麼|分析/.test(talk)) scores.observer += 1;
    if (/應該|必須|要先/.test(talk)) scores.gatekeeper += 1;

    // pick highest, tie-break: prover
    let best = 'prover', max = -1;
    for (const k of Object.keys(scores)) {
      if (scores[k] > max) { max = scores[k]; best = k; }
    }
    return REPORTS[best];
  }

  /* ---------- Typewriter hook ---------- */
  function useTypewriter(lines, speed = 28, startDelay = 400){
    const [out, setOut] = useState([]);
    const [done, setDone] = useState(false);
    const [skip, setSkip] = useState(false);

    useEffect(() => {
      if (skip) {
        setOut(lines);
        setDone(true);
        return;
      }
      let cancelled = false;
      let line = 0;
      let ch = 0;
      let buf = lines.map(() => '');
      const tick = () => {
        if (cancelled) return;
        if (line >= lines.length) { setDone(true); return; }
        const full = lines[line];
        if (full.length === 0) {
          buf[line] = '';
          line++; ch = 0;
          setOut([...buf]);
          setTimeout(tick, 260);
          return;
        }
        ch++;
        buf[line] = full.slice(0, ch);
        setOut([...buf]);
        if (ch >= full.length) {
          const pause = /[。？！，]$/.test(full) ? 340 : 180;
          line++; ch = 0;
          setTimeout(tick, pause);
        } else {
          setTimeout(tick, speed + Math.random() * 20);
        }
      };
      const t = setTimeout(tick, startDelay);
      return () => { cancelled = true; clearTimeout(t); };
    }, [skip]);

    return { out, done, skip: () => setSkip(true) };
  }

  /* ---------- IG Story Modal (1080 × 1920) ---------- */
  function StoryModal({ onClose, report }){
    const cardRef = useRef(null);
    const [busy, setBusy] = useState(false);

    const download = async () => {
      if (!cardRef.current || !window.html2canvas) return;
      setBusy(true);
      try {
        const canvas = await window.html2canvas(cardRef.current, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: true,
          width: 1080,
          height: 1920,
          windowWidth: 1080,
          windowHeight: 1920,
        });
        const link = document.createElement('a');
        link.download = 'rewire-neural-map-prover.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch(e){ console.error(e); }
      setBusy(false);
    };

    // preview scale: fit story (1080x1920) into viewport
    const [scale, setScale] = useState(0.3);
    useEffect(() => {
      const fit = () => {
        const vh = window.innerHeight - 180;
        const vw = window.innerWidth - 80;
        setScale(Math.min(vh/1920, vw/1080, 0.5));
      };
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    return (
      <div style={mStyles.backdrop} onClick={onClose}>
        <div style={mStyles.inner} onClick={e=>e.stopPropagation()}>
          <div style={mStyles.header}>
            <div style={mStyles.headTitle}>IG Story · 1080 × 1920</div>
            <button onClick={onClose} style={mStyles.close}>✕</button>
          </div>

          <div style={{...mStyles.stage, height: 1920 * scale + 20}}>
            <div style={{transform: `scale(${scale})`, transformOrigin:'top center'}}>
              <StoryCard innerRef={cardRef} report={report}/>
            </div>
          </div>

          <div style={mStyles.actions}>
            <button style={mStyles.dlBtn} onClick={download} disabled={busy}>
              {busy ? '生成中⋯' : '↓ 下載圖片'}
            </button>
            <div style={mStyles.hint}>下載後長按圖片 → 儲存 → 到 IG 發 Story · 記得標 @my.rewire</div>
          </div>
        </div>
      </div>
    );
  }
